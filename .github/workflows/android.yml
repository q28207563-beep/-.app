name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: 下载干净的 gradlew（自动 LF 格式）
      run: |
        curl -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew
        chmod +x gradlew
    - name: 构建调试 APK
      run: ./gradlew assembleDebug
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: '**/*.apk'

# Codemagic安卓构建配置文件
workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17 # 安卓构建需要JDK 17
    scripts:
      # 赋予Gradle执行权限
      - chmod +x ./gradlew.bat
      # 构建Debug版APK（如需Release，改assembleRelease）
      - ./gradlew.bat assembleDebug
    artifacts:
      # 指定要导出的APK路径（构建完成后可下载）
      - app/build/outputs/apk/**/*.apk
    publishing:
      # 可选：构建完成后自动发送通知（如邮件）
      email:
        recipients:
          - your@email.com
